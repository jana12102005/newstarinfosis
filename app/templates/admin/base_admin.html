{% extends "base.html" %}
{% block content %}
<div class="dashboard-layout">

  <!-- ADMIN SIDEBAR -->
  <aside class="sidebar" style="border-right:1px solid var(--border);">
    <div class="sidebar-header">
      <div class="sidebar-name" style="color:var(--gold);">★ Admin Panel</div>
      <div class="sidebar-role">{{ current_user.name }}</div>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('admin.dashboard') }}"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="{{ url_for('admin.projects') }}"><i class="fas fa-code"></i> Projects</a>
      <a href="{{ url_for('admin.team') }}"><i class="fas fa-users"></i> Team</a>
      <a href="{{ url_for('admin.requests') }}"><i class="fas fa-file-alt"></i> Requests</a>
      <a href="{{ url_for('admin.internships') }}"><i class="fas fa-briefcase"></i> Internships</a>
      <a href="{{ url_for('admin.users') }}"><i class="fas fa-user-shield"></i> Users</a>
      <a href="{{ url_for('admin.contacts') }}"><i class="fas fa-envelope"></i> Messages</a>
      <a href="{{ url_for('public.index') }}" style="margin-top:16px;"><i class="fas fa-globe"></i> View Site</a>
      <a href="{{ url_for('auth.logout') }}" style="color:var(--muted);"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <div class="dashboard-content">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
